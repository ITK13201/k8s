---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mailserver-data-pv
  labels:
    target-app: mailserver-data
spec:
  capacity:
    storage: 20Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  local:
    path: /data/k8s/pv/mailserver/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: Exists
