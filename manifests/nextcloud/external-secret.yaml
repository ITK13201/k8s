---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextcloud-mariadb-secret
  namespace: nextcloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nextcloud-mariadb-secret
    creationPolicy: Owner
  data:
  - secretKey: mariadb-database
    remoteRef:
      key: nextcloud-mariadb-secret
      property: mariadb-database
  - secretKey: mariadb-host
    remoteRef:
      key: nextcloud-mariadb-secret
      property: mariadb-host
  - secretKey: mariadb-password
    remoteRef:
      key: nextcloud-mariadb-secret
      property: mariadb-password
  - secretKey: mariadb-root-password
    remoteRef:
      key: nextcloud-mariadb-secret
      property: mariadb-root-password
  - secretKey: mariadb-user
    remoteRef:
      key: nextcloud-mariadb-secret
      property: mariadb-user
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextcloud-redis-secret
  namespace: nextcloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nextcloud-redis-secret
    creationPolicy: Owner
  data:
  - secretKey: redis-password
    remoteRef:
      key: nextcloud-redis-secret
      property: redis-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextcloud-secret
  namespace: nextcloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nextcloud-secret
    creationPolicy: Owner
  data:
  - secretKey: nextcloud-password
    remoteRef:
      key: nextcloud-secret
      property: nextcloud-password
  - secretKey: nextcloud-token
    remoteRef:
      key: nextcloud-secret
      property: nextcloud-token
  - secretKey: nextcloud-username
    remoteRef:
      key: nextcloud-secret
      property: nextcloud-username
