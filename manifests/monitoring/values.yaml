---
# kube-prometheus-stack values
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          storageClassName: manual
          selector:
            matchLabels:
              target-app: prometheus-server

    # Retention settings
    retention: 15d
    retentionSize: 45GB

    # Resource limits (適切に調整)
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Scrape interval
    scrapeInterval: 30s
    evaluationInterval: 30s

# Alertmanager configuration
alertmanager:
  alertmanagerSpec:
    # Storage configuration
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: manual
          selector:
            matchLabels:
              target-app: prometheus-alertmanager

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Alertmanager configuration (初期はログのみ)
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'null'
    receivers:
    - name: 'null'

# Grafana configuration
grafana:
  # Skip chown on startup (PV directory already owned by 472:472)
  initChownData:
    enabled: false

  # Admin credentials from Secret (credentials/monitoring/grafana.env)
  admin:
    existingSecret: grafana
    userKey: GF_SECURITY_ADMIN_USER
    passwordKey: GF_SECURITY_ADMIN_PASSWORD

  # Persistence
  persistence:
    enabled: true
    existingClaim: grafana-pvc
    storageClassName: manual
    size: 10Gi

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  grafana.ini:
    server:
      domain: grafana.i-tk.dev
      root_url: https://grafana.i-tk.dev
    security:
      cookie_secure: true
      cookie_samesite: lax
      csrf_trusted_origins: grafana.i-tk.dev

  # Loki datasource
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false

  # Default dashboards enabled
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Tokyo

# Node Exporter
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# kube-state-metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Default ServiceMonitors and PodMonitors
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# ServiceMonitor for various components
kubeApiServer:
  enabled: true

kubelet:
  enabled: true

kubeControllerManager:
  enabled: true

coreDns:
  enabled: true

kubeDns:
  enabled: false

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
