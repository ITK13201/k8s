---
# grafana/loki values
# https://github.com/grafana/loki/tree/main/production/helm/loki

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  limits_config:
    retention_period: 720h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: manual
    size: 30Gi
    selector:
      matchLabels:
        target-app: loki
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable minio (use filesystem)
minio:
  enabled: false

# Disable test
test:
  enabled: false

# Disable self-monitoring (requires Grafana Agent Operator)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
