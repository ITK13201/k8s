---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mailserver-resend-secret
  namespace: mailserver
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mailserver-resend-secret
    creationPolicy: Owner
  data:
  - secretKey: RELAY_PASSWORD
    remoteRef:
      key: mailserver-resend-secret
      property: RELAY_PASSWORD
