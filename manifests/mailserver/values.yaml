---
deployment:
  # docker-mailserver は s6-overlay を init システムとして使用しており root で動作させる必要がある
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  env:
    OVERRIDE_HOSTNAME: mail.i-tk.dev
    ENABLE_OPENDKIM: 1.0
    ENABLE_OPENDMARC: 1.0
    ENABLE_RSPAMD: 1.0
    ENABLE_CLAMAV: 0.0      # メモリ消費が大きいため無効
    ENABLE_FAIL2BAN: 1.0
    # Resend SMTP リレー設定（送信専用）
    RELAY_HOST: smtp.resend.com
    RELAY_PORT: "587"
    RELAY_USER: resend
  # Secret から RELAY_PASSWORD を注入
  secretEnvironments:
  - mailserver-resend-secret
  # ワーカーノードにスケジュール固定（hostPort のため）
  nodeSelector:
    kubernetes.io/hostname: k8s-worker01
  resources:
    requests:
      cpu: 500m
      memory: 1536Mi
    limits:
      cpu: 2000m
      memory: 2048Mi

certificate: "mailserver-tls"

persistent_volume_claims:
  mail-config:
    size: 1Gi
    storageClass: manual
    selector:
      matchLabels:
        target-app: mailserver-config
  mail-data:
    size: 20Gi
    storageClass: manual
    selector:
      matchLabels:
        target-app: mailserver-data
  mail-state:
    size: 1Gi
    storageClass: manual
    selector:
      matchLabels:
        target-app: mailserver-state
  mail-log:
    size: 5Gi
    storageClass: manual
    selector:
      matchLabels:
        target-app: mailserver-log
