---
deployment:
  # docker-mailserver は s6-overlay を init システムとして使用しており root で動作させる必要がある
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  env:
    OVERRIDE_HOSTNAME: mail.i-tk.dev
    ENABLE_OPENDKIM: 1.0
    ENABLE_OPENDMARC: 1.0
    ENABLE_RSPAMD: 1.0
    ENABLE_CLAMAV: 0.0      # メモリ消費が大きいため無効
    ENABLE_FAIL2BAN: 1.0
    # Resend SMTP リレー設定（送信専用）
    RELAY_HOST: smtp.resend.com
    RELAY_PORT: "465"
    RELAY_USER: resend
  envFrom:
  - secretRef:
      name: mailserver-resend-secret  # RELAY_PASSWORD を注入
  # hostPort でワーカーノードのポートに直接バインド（シングルワーカー構成）
  hostPorts:
    enabled: true

certificate: "mailserver-tls"

persistence:
  config:
    enabled: true
    size: 1Gi
    storageClass: manual
    accessMode: ReadWriteOnce
  data:
    enabled: true
    size: 20Gi
    storageClass: manual
    accessMode: ReadWriteOnce
  state:
    enabled: true
    size: 1Gi
    storageClass: manual
    accessMode: ReadWriteOnce
  log:
    enabled: true
    size: 5Gi
    storageClass: manual
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 500m
    memory: 1536Mi
  limits:
    cpu: 2000m
    memory: 2048Mi

# ワーカーノードにスケジュール固定（hostPort のため）
nodeSelector:
  kubernetes.io/hostname: k8s-worker01
