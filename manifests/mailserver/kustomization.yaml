---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mailserver
helmCharts:
- name: docker-mailserver
  repo: https://docker-mailserver.github.io/docker-mailserver-helm
  version: 5.1.1
  releaseName: mailserver
  namespace: mailserver
  valuesFile: values.yaml
  valuesMerge: override
resources:
- certificate.yaml
patches:
# Helm チャートリソースへの namespace 付与（kustomize の namespace: フィールドが helmCharts に適用されないため）
- patch: '[{"op":"add","path":"/metadata/namespace","value":"mailserver"}]'
  target:
    kind: ServiceAccount
- patch: '[{"op":"add","path":"/metadata/namespace","value":"mailserver"}]'
  target:
    kind: ConfigMap
- patch: '[{"op":"add","path":"/metadata/namespace","value":"mailserver"}]'
  target:
    kind: Service
- patch: '[{"op":"add","path":"/metadata/namespace","value":"mailserver"}]'
  target:
    kind: PersistentVolumeClaim
- patch: '[{"op":"add","path":"/metadata/namespace","value":"mailserver"}]'
  target:
    kind: Deployment
# hostPort パッチ
- path: patch-hostport.yaml
  target:
    kind: Deployment
    name: mailserver-docker-mailserver
