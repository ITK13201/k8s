---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mariadb-secret
  namespace: rss-generator
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mariadb-secret
    creationPolicy: Owner
  data:
  - secretKey: mariadb-password
    remoteRef:
      key: rss-generator-mariadb-secret
      property: mariadb-password
  - secretKey: mariadb-root-password
    remoteRef:
      key: rss-generator-mariadb-secret
      property: mariadb-root-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rss-generator-secret
  namespace: rss-generator
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: rss-generator-secret
    creationPolicy: Owner
  data:
  - secretKey: database-password
    remoteRef:
      key: rss-generator-secret
      property: database-password
