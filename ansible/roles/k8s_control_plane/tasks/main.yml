---
- name: Check if control plane is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

- name: Initialize control plane
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr={{ k8s_pod_network_cidr }}
  when: not k8s_admin_conf.stat.exists
  changed_when: true

- name: Create .kube directory for root
  ansible.builtin.file:
    path: "{{ k8s_kubeconfig_dir }}"
    state: directory
    mode: '0700'

- name: Copy admin.conf to root kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ k8s_kubeconfig_dir }}/config"
    remote_src: true
    mode: '0600'

- name: Apply Calico CNI
  ansible.builtin.command: >
    kubectl apply -f
    https://raw.githubusercontent.com/projectcalico/calico/{{ k8s_calico_version }}/manifests/calico.yaml
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_dir }}/config"
  register: k8s_calico_result
  changed_when: "'created' in k8s_calico_result.stdout or 'configured' in k8s_calico_result.stdout"
  retries: 3
  delay: 10
