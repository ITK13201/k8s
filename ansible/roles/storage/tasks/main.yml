---
- name: Create mount point directories
  ansible.builtin.file:
    path: "{{ item.mount_point }}"
    state: directory
    mode: "0755"
  loop: "{{ storage_disks }}"
  tags: storage

- name: Mount disks and add to fstab
  ansible.builtin.mount:
    src: "UUID={{ item.uuid }}"
    path: "{{ item.mount_point }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.options }}"
    state: mounted
  loop: "{{ storage_disks }}"
  tags: storage
